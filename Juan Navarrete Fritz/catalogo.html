    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="main_navbar">
      <div class="logo_container">
        <a href="index.html"><img src="Imagenes/Gemini_Generated_Image_rsvi2drsvi2drsvi (1).png" alt="Cacharro Viejo Logo"></a>
      </div>
      <ul>
        <li class="nav-cont"><a href="catalogo.html">Catalogo</a></li>
        <li class="nav-cont"><a href="compra.html">Comprar</a></li>
      </ul>
    </nav>
    </header>  

    <!-- ── HERO: foto + colores centrados ── -->
    <section class="catalogo-hero">
        <img id="imagen_vehiculo" alt="Vehículo" class="catalogo-hero__img">
        <div class="catalogo-hero__colores">
            <label class="catalogo-hero__colores-label">Colores Disponibles</label>
            <div id="selector_colores" class="catalogo-hero__selector"></div>
        </div>
    </section>

    <!-- ── PANEL INFERIOR: 3 columnas ── -->
    <section class="catalogo-panel">

        <!-- Columna 1: Especificaciones -->
        <div class="catalogo-panel__specs">
            <h3 class="catalogo-panel__titulo">Especificaciones</h3>
            <ul id="detalles-auto" class="list-group list-group-flush">
                <!-- JS inyectará los detalles aquí -->
            </ul>
        </div>

        <!-- Columna 2: Opciones adicionales -->
        <div class="catalogo-panel__opciones">
            <h3 class="catalogo-panel__titulo">Opciones</h3>
            <div id="contenedor_adicionales"></div>
        </div>

        <!-- Columna 3: Resumen de compra -->
        <div class="catalogo-panel__resumen">
            <h3 class="catalogo-panel__titulo">Resumen</h3>
            <p id="valor_base" class="resumen-linea"></p>
            <p id="valor_color" class="resumen-linea"></p>
            <ul id="valor_extras" class="resumen-extras"></ul>
            <div class="resumen-total">
                <span>Total a Pagar</span>
                <span id="precio_total_display">$0</span>
            </div>
        </div>

    </section>


    <section class="footer_main">
    <footer class="footer_settings">
      <div class="footer_top">
        <a class="logo_link" href="index.html"><img src="Imagenes/Gemini_Generated_Image_rsvi2drsvi2drsvi (1).png" alt="Paddock Style logo"></a>

          <div class="footer_col">
            <p class="col_title">Contáctanos</p>
            <div class="col_info">
              <li><i class="bi bi-telephone"></i> +56 9 1405 3314</li>
              <li><a href="https://www.instagram.com/" target="_blank"><i class="bi bi-instagram"></i> Instagram</a>
              </li>
              <li><a href="mailto:juan.navarrete.fritz@gmail.com?subject=Consulta"><i
                    class="bi bi-envelope-at-fill"></i> contactopaddockstyle@gmail.com</a></li>
            </div>
          </div>
          <div class="footer_col">
            <p class="col_title">Sucursal</p>
            <div class="col_info">
              <a href="https://maps.app.goo.gl/JxFjL1ubP11rrr3u6" target="_blank"><i class="bi bi-geo-alt"></i> Av.
                Pedro Aguirre Cerda 2115</a>
            </div>
          </div>
        </div>
      </div>

</body>
